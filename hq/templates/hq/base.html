{% load static %}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#050608">
<title>{% block title %}The S&amp;E Partners HQ{% endblock %}</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23050608'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' fill='%23d4af6c' font-family='Georgia,serif' font-style='italic' font-weight='500' font-size='28'%3ES%26E%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'hq/css/style.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">

<div class="parallax-stage" aria-hidden="true">
  <div class="mesh mesh-1"></div>
  <div class="mesh mesh-2"></div>
  <div class="mesh mesh-3"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>
  <div class="vignette"></div>
</div>

<header class="topbar">
  <a href="{% url 'dashboard' %}" class="brand">
    <span class="brand-mark">S&amp;E</span>
    <span class="brand-name">The S&amp;E Partners HQ</span>
  </a>
  <nav class="topnav">
    {% if request.session.hq_auth %}
      <span class="pill" id="connection-pill"><span class="dot"></span> <span id="connection-label">connecting</span></span>
      <a class="navlink" href="{% url 'logout' %}">Logout</a>
    {% endif %}
  </nav>
</header>

<main class="shell">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <span>S&amp;E Partners HQ · Sovereign prospecting console</span>
  <span class="mono" id="server-clock">—</span>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
